<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
 <title>Inspiration cloud</title>
 <link rel="preconnect" href="https://fonts.googleapis.com" />
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
 <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
 <link rel="stylesheet" href="styles.css" />
</head>
<body>
 <div id="app">
   <button type="button" class="folder-corner-btn" id="btn-folder-library" aria-label="Folders" title="Folders">
     <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
       <path d="M3 8.5V18a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8.5H13l-1.5-2h-5L5 8.5H3z" />
     </svg>
   </button>


   <div class="folder-context" id="folder-context" hidden>
     <span class="folder-context__swatch" id="folder-context-swatch" aria-hidden="true"></span>
     <span class="folder-context__label" id="folder-context-label"></span>
     <button type="button" class="folder-context__clear" id="folder-context-clear" aria-label="Show all pins">×</button>
   </div>


   <div class="viewport" id="viewport">
     <div class="world" id="world">
       <div class="pins-layer" id="pins-layer"></div>
     </div>
   </div>


   <div class="select-bar" id="select-bar" hidden>
     <span class="select-bar__count" id="select-count">0 selected</span>
     <button type="button" class="select-bar__action" id="btn-save-folder">Save to folder…</button>
     <button type="button" class="select-bar__danger" id="btn-delete-selected">Delete</button>
     <button type="button" class="select-bar__ghost" id="btn-clear-select">Clear</button>
   </div>


   <aside class="focus-panel" id="focus-panel" hidden aria-live="polite">
     <div class="focus-panel__inner">
       <button type="button" class="focus-panel__close" id="focus-close" aria-label="Close">×</button>
       <div class="focus-panel__groups" id="focus-tag-groups"></div>
       <div class="focus-panel__notes-block" id="focus-notes-block" hidden>
         <p class="focus-panel__label">notes</p>
         <p class="focus-panel__notes" id="focus-notes"></p>
       </div>
     </div>
   </aside>


   <!-- Upload picker (shown when + is clicked) -->
   <div class="upload-picker" id="upload-picker" hidden>
     <button type="button" class="upload-picker__opt" id="upload-picker-computer">
       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
       <span>Upload from computer</span>
     </button>
     <button type="button" class="upload-picker__opt" id="upload-picker-drop">
       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
       <span>Drag &amp; drop an image</span>
     </button>
   </div>

   <footer class="dock" id="dock">
     <button type="button" class="dock__btn dock__btn--light" id="btn-select">Select</button>
     <div class="dock__search-wrap">
       <label class="sr-only" for="search-input">Search</label>
       <input type="search" class="dock__search" id="search-input" placeholder="Search" autocomplete="off" />
     </div>
     <button type="button" class="dock__btn dock__btn--icon" id="btn-edit" aria-label="Edit pin or search" title="Edit focused pin / search">
       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
         <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
       </svg>
     </button>
     <button type="button" class="dock__btn dock__btn--accent" id="btn-add" aria-label="Add image">
       <span class="dock__plus">+</span>
     </button>
   </footer>
   


   <input type="file" id="file-input" accept="image/*" class="sr-only" />


   <!-- Tagging overlay -->
   <div class="tagging" id="tagging" hidden>
     <div class="tagging__panel">
       <div class="tagging__preview-wrap">
         <div class="tagging__frame">
           <img id="tagging-preview" alt="" />
         </div>
       </div>
       <div class="tagging__side">
         <div class="tagging__block">
           <p class="tagging__label">What about this image?</p>
           <div class="tagging__row">
             <div class="tagging__chips" id="tier1-chips" role="group" aria-label="Primary tags"></div>
             <button type="button" class="tagging__icon-btn" id="tier1-add" aria-label="Add tag">+</button>
             <input
               type="text"
               class="tagging__tag-input"
               id="tier1-custom"
               placeholder="type a tag, enter to add…"
               enterkeyhint="done"
               aria-label="Custom tag"
               hidden
             />
             <button type="button" class="tagging__icon-btn tagging__icon-btn--round" id="tier1-refresh" aria-label="Refresh suggestions" title="Refresh">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                 <path d="M21 12a9 9 0 0 1-9 9 3.07 3.07 0 0 1-2.12-.87M3 12a9 9 0 0 1 9-9c2.47 0 4.78 1 6.43 2.57M21 3v6h-6M3 21v-6h6" />
               </svg>
             </button>
           </div>
         </div>


         <div class="tagging__block" id="tier2-block" hidden>
           <p class="tagging__label tagging__label--row">
             <span id="tier2-title">What about the colors?</span>
             <button type="button" class="tagging__mini-x" id="tier2-close" aria-label="Close detail tags">×</button>
           </p>
           <div class="tagging__row">
             <div class="tagging__chips" id="tier2-chips" role="group" aria-label="Detail tags"></div>
             <button type="button" class="tagging__icon-btn" id="tier2-add" aria-label="Add detail tag">+</button>
             <input
               type="text"
               class="tagging__tag-input"
               id="tier2-custom"
               placeholder="type detail, enter to add…"
               enterkeyhint="done"
               aria-label="Custom detail tag"
               hidden
             />
             <button type="button" class="tagging__icon-btn tagging__icon-btn--round" id="tier2-refresh" aria-label="Refresh suggestions" title="Refresh">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                 <path d="M21 12a9 9 0 0 1-9 9 3.07 3.07 0 0 1-2.12-.87M3 12a9 9 0 0 1 9-9c2.47 0 4.78 1 6.43 2.57M21 3v6h-6M3 21v-6h6" />
               </svg>
             </button>
           </div>
         </div>


         <div class="tagging__block tagging__notes">
           <button type="button" class="tagging__notes-toggle" id="notes-toggle" aria-expanded="true">
             <span>Share more thoughts</span>
             <span class="tagging__chev" id="notes-chev">^</span>
           </button>
           <div class="tagging__notes-body" id="notes-body">
             <label class="sr-only" for="notes-input">Notes</label>
             <textarea id="notes-input" class="tagging__textarea" rows="5" placeholder="I like the soft gradients indicating form"></textarea>
           </div>
         </div>


         <div class="tagging__footer">
           <button type="button" class="tagging__save" id="tagging-save">Save</button>
         </div>
       </div>
     </div>
   </div>


   <!-- Folder modal -->
   <div class="modal-backdrop" id="folder-modal" hidden>
     <div class="modal" role="dialog" aria-labelledby="folder-modal-title">
       <h2 class="modal__title" id="folder-modal-title">Save to folder</h2>
       <p class="modal__hint">Choose a folder for the selected pins.</p>
       <label class="sr-only" for="folder-select">Existing folders</label>
       <select id="folder-select" class="modal__select"></select>
       <label class="modal__field">
         <span class="modal__field-label">New folder name</span>
         <input type="text" id="folder-new" class="modal__input" placeholder="e.g. poster-design" />
       </label>
       <div class="modal__actions">
         <button type="button" class="modal__btn modal__btn--ghost" id="folder-cancel">Cancel</button>
         <button type="button" class="modal__btn" id="folder-confirm">Save</button>
       </div>
     </div>
   </div>


   <!-- Delete choice modal (shown when deleting while inside a folder) -->
   <div class="modal-backdrop" id="delete-choice-modal" hidden>
     <div class="modal" role="dialog" aria-labelledby="delete-choice-title">
       <h2 class="modal__title" id="delete-choice-title">Do you want to delete this media or remove it from this folder?</h2>
       <p class="modal__hint" id="delete-choice-hint">Deleting is permanent and can not be undone</p>
       <div class="modal__actions modal__actions--delete">
         <button type="button" class="modal__btn modal__btn--ghost" id="delete-choice-cancel">Cancel</button>
         <button type="button" class="modal__btn modal__btn--ghost" id="delete-choice-remove">Remove from folder</button>
         <button type="button" class="modal__btn modal__btn--danger" id="delete-choice-permanent">Delete</button>
       </div>
     </div>
   </div>

   <section class="folders-screen" id="folders-screen" hidden aria-label="Folders">
     <div class="folders-viewport" id="folders-viewport">
       <div class="folders-world" id="folders-world">
         <div class="folders-canvas" id="folders-canvas"></div>
       </div>
     </div>
   </section>
 </div>




 <!-- Drag-and-drop overlay -->
 <div class="drop-overlay" id="drop-overlay" hidden aria-hidden="true">
   <div class="drop-overlay__inner">
     <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
     <p class="drop-overlay__label">Drop image to add</p>
   </div>
 </div>

 <canvas id="analyze-canvas" class="sr-only" width="32" height="32" aria-hidden="true"></canvas>
 <script src="app.js"></script>
</body>
</html>
